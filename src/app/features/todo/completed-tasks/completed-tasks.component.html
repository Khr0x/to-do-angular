<div class="completed-container">
  <div class="header-section">
    <mat-card>
      <mat-card-content>
        <div class="header-content">
          <div class="header-info">
            <mat-icon class="header-icon">task_alt</mat-icon>
            <div>
              <h1>Tareas Completadas</h1>
              <p>Has completado {{ taskService.completedCount() }} tareas</p>
            </div>
          </div>
        </div>
      </mat-card-content>
    </mat-card>
  </div>

  @if (taskService.completedTasks().length > 0) {
    <div class="completed-list">
      @for (task of paginatedTasks(); track task.id) {
        <app-task-card
          [task]="task"
          type="completed"
          (restore)="restoreTask($event)"
          (delete)="deleteTask($event)">
        </app-task-card>
      }
    </div>

    <!-- Paginador -->
    <mat-paginator
      [length]="taskService.completedCount()"
      [pageSize]="pageSize()"
      [pageIndex]="pageIndex()"
      [pageSizeOptions]="pageSizeOptions"
      (page)="onPageChange($event)"
      showFirstLastButtons
      class="paginator">
    </mat-paginator>
  } @else {
    <mat-card class="empty-state">
      <mat-card-content>
        <mat-icon>inbox</mat-icon>
        <h2>No hay tareas completadas</h2>
        <p>Las tareas que completes aparecerán aquí.</p>
      </mat-card-content>
    </mat-card>
  }
</div>
