<h2 mat-dialog-title>
  <mat-icon color="primary">add_task</mat-icon>
  Nueva Tarea
</h2>
<mat-dialog-content>
  <form [formGroup]="taskForm" class="task-form">
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Título de la tarea</mat-label>
      <input matInput formControlName="title" placeholder="Ej: Comprar víveres">
      <mat-icon matPrefix>title</mat-icon>
      @if (taskForm.get('title')?.hasError('required') && taskForm.get('title')?.touched) {
        <mat-error>El título es requerido</mat-error>
      }
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Descripción (opcional)</mat-label>
      <textarea
        matInput
        formControlName="description"
        rows="3"
        placeholder="Agrega detalles adicionales..."></textarea>
      <mat-icon matPrefix>description</mat-icon>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Prioridad</mat-label>
      <mat-select formControlName="priority">
        <mat-option value="Baja">
          <mat-icon class="priority-icon low">low_priority</mat-icon>
          Baja
        </mat-option>
        <mat-option value="Media">
          <mat-icon class="priority-icon medium">drag_handle</mat-icon>
          Media
        </mat-option>
        <mat-option value="Alta">
          <mat-icon class="priority-icon high">priority_high</mat-icon>
          Alta
        </mat-option>
      </mat-select>
      <mat-icon matPrefix>flag</mat-icon>
    </mat-form-field>
  </form>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-stroked-button (click)="cancel()">
    Cancelar
  </button>
  <button
    mat-flat-button
    color="primary"
    (click)="addTask()"
    [disabled]="taskForm.invalid">
    <mat-icon>add</mat-icon>
    Agregar
  </button>
</mat-dialog-actions>
