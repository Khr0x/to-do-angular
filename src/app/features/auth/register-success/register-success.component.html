<div class="success-container">
  <mat-card class="success-card">
    <div class="icon-container">
      <mat-icon>check_circle</mat-icon>
    </div>

    <h2>¡Cuenta creada exitosamente!</h2>
    <p>Tu cuenta ha sido registrada. Ahora puedes iniciar sesión para comenzar a usar la app.</p>

    <button mat-flat-button color="primary" routerLink="/auth/login" class="login-btn">
      <mat-icon>login</mat-icon>
      Iniciar sesión
    </button>
  </mat-card>
</div>
